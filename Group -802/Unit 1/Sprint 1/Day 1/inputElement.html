<!DOCTYPE html>
<html lang="en">
<head>
    <title>Input Elements</title>
</head>
<body>

    <!-- Input Element - to take input or data from users -->

    <input type="text" placeholder="Enter Name">
    <br>
    <input type="text" value="Enter Name">

    <!-- Different Types of input boxes-->

    <br>
    <input type="email">
    <br>
    <input type="password">
     <br>
    <input type="search">
     <br>
    <input type="file">
    <br>
    <input type="time">
     <br>
    <input type="datetime-local">
    <br>
    <input type="month">
    <br>
    <input type="range" value="20">
    <br>
    <input type="url">
</body>
</html>
