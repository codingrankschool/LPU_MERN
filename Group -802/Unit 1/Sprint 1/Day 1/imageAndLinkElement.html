<!DOCTYPE html>
<html lang="en">
<head>
    <title>Image Element and Link Element</title>
</head>
<body>

    <!-- Image element -->

    <img src="./anand.jpg" alt="Anand Image" width="200px" height="200px">

    <hr>
    <!-- Link  -->

    <a href="./anand.jpg">Link to Image</a>
    <br>
    <a target="_self" href="./textElementExample.html">Blog Self Page</a>

    <br>
    <a target="_blank" href="./textElementExample.html">Blog Blank Page</a>

    <br>

    <a title="anand image" download="image" href="./anand.jpg">Image Download</a>


    
</body>
</html>
