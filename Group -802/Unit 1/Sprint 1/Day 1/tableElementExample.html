<!DOCTYPE html>
<html lang="en">
<head>
    <title>Table Element</title>
</head>
<body>

    <!-- 
    Table structure - similar to - html
    html head - thead
    html body - tbody


    table attributes:
    border
    cellpadding
    cellspacing
    bgcolor

    -->

    <table border="1" cellpadding="10px" cellspacing="10px" bgcolor="red">

        <caption>Student Table</caption>

        <thead bgcolor="yellow">

            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>City</th>
            </tr>

        </thead>

        <tbody bgcolor="white"> 

            <!-- row 1 -->

            <tr>
                <td>Pankaj</td>
                <td>pankaj@gmail.com</td>
                <td>Noida</td>
            </tr>

            <!-- row 2 -->

            <tr>
                <td>Pankaj</td>

                <td>Noida</td>
            </tr>

            <!-- row 3 -->

            <tr>
                <td>Pankaj</td>

                <td>Noida</td>
            </tr>

        </tbody>


    </table>
    
</body>
</html>
