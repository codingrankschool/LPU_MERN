<!DOCTYPE html>
<html lang="en">
<head>
    <title>Introduction to CSS</title>
</head>
<body>

    <!-- CSS:
    1. Inline CSS
    2. Internal CSS
    3. External CSS 

    1. Inline CSS - here we can give style to particular element line by line or element by element.

    How will you do this?

    Note: Every html element having one common attribute - style, with help of this attribute you can give style to particular element line by line or element by element.

    Knowledge:
    HTML is collection/set of html elements/markup tags.

    CSS is collection css properpties, with help of these properties we can give style to particular element line by line or element by element.


    Example: color, background-color, font-size, font-weight, width, height, and others.

    Note: inline css we give style to particular element using style attribute where we use css prperty in form of name value pair


    Exmaple:

    <p style="propertyName:propertyValue;propertyName:propertyValue;"></p>

    -->
    

    <h1 style="background-color: red;color: white;">Hello Welcome to CSS</h1>
    <hr>
    <p style="background-color: #0000ff;color: white;">Student - 1</p>
    <p style="background-color: #0000ff;color: white;">Student - 2</p>
    <p style="background-color: #0000ff;color: white;">Student - 3</p>
    <p style="background-color: #0000ff;color: white;">Student - 4</p>
    <p style="background-color: #0000ff;color: white;">Student - 5</p>


    <!-- color property:
    1. using colors name: limited colors name
    Example: red, black, blue others
    2. using hexa code: millions of colors combinations - recommened in industry to use
    Example: #ff0000, #0000ff 
    3. decimal value - huge combination 
    Example: rbg(255, 0, 0)
    -->
