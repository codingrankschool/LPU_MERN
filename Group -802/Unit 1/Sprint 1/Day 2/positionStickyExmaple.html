<!DOCTYPE html>
<html lang="en">
<head>
    <title>Position stiky</title>

    <style>

        *{
            margin: 0;
        }

        h1{
            background-color: red;
            color: white;
            padding: 10px;
            position: sticky;
            top: 0;
        }
        p{
            height: 1000px;
        }

    </style>

</head>
<body>

    <h1>HTML</h1>
    <p>HTML Content</p>

    
    <h1>CSS</h1>
    <p>CSS Content</p>
    
    <h1>Javascript</h1>
    <p>Javascript Content</p>

    
    <h1>React</h1>
    <p>React Content</p>
    
</body>
</html>
