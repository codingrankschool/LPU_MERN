<!DOCTYPE html>
<html lang="en">
<head>
    <title>Get Data From Form</title>

    <style>

        form{
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
            border: 1px dotted;
        }

        #student-container{
            margin: 10px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-auto-rows: minmax(150px, 1fr);
            gap: 10px;
        }

        #student-container>div{
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
            text-align: center;
            padding: 10px;
        }

    </style>

</head>
<body>

    <form>

        <input name="name" type="text" placeholder="Enter Name">

        <input name="email" type="email" placeholder="Enter Email">

        <input name="password" type="password" placeholder="Enter Password">

        <input type="submit" value="Register">
    </form>

    <div id="student-container">

    </div>
    
</body>
</html>

<script>

    var form = document.querySelector('form')

    var students = []

    form.addEventListener('submit', function(event){
        event.preventDefault()


        // var studentNameInput = document.getElementById('name')

        // var studentEmailInput = document.getElementById('email')

        // var studentPasswordInput = document.getElementById('password')

        // var name = studentNameInput.value

        // var email = studentEmailInput.value

        // var password = studentPasswordInput.value


        // console.log(name, email, password)

        //modern approach

        // var name = form.name.value
        // var email = form.email.value
        //  var password = form.password.value


        //  console.log(name, email, password)

        var student = {
            name: form.name.value,
            email: form.email.value,
            password: form.password.value
        }

        // console.log(student)
        students.push(student)

        // console.log(students)

        displayStudent(students)
    })

    var studentContainer = document.getElementById('student-container')


    function displayStudent(data){
        studentContainer.innerText = ""
        data.forEach(function(student){

            var studentCard = document.createElement('div')

            var studentName = document.createElement('h4')

            studentName.innerText = student.name

            var studentEmail = document.createElement('p')

            studentEmail.innerText = student.email

            var studentPassword = document.createElement('p')

            studentPassword.innerText = student.password

            studentCard.append(studentName, studentEmail, studentPassword)


            studentContainer.append(studentCard)


        })

    }


</script>
