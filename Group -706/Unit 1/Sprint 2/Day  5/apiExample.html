<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
</head>
<body>

    <input id="search" type="search" placeholder="Search Movie">
    <div id="search-result">

    </div>
    
</body>
</html>

<script>

    //api - http://www.omdbapi.com/?apikey=16863ec7&t="avenger"


    document.getElementById('search').addEventListener('input', function(){
        let movieToSearch = document.getElementById('search').value
        getMovie(movieToSearch)
    })

    async function getMovie(title){
        let response = await fetch(`http://www.omdbapi.com/?s=${title}&apikey=16863ec7`)
        let data = await response.json()

        console.log(data.Search)
        displaySearchMovies(data.Search)
    }   

    let searchBox = document.getElementById('search-result')

    function displaySearchMovies(data){

       if(!data && data.length == 0){
        console.log("Not availabe")
       }else{
         data.forEach(function(movie){
            let movieCard = document.createElement('div')
            let moviePoster = document.createElement('img')
            moviePoster.src = movie.Poster

            let movieTitle = document.createElement('p')
            movieTitle.innerText = movie.Title

            movieCard.append(moviePoster, movieTitle)

            searchBox.append(movieCard)

        })
       }

    }

</script>
