<!DOCTYPE html>
<html lang="en">
<head>
    <title>Id and class selector</title>

    <style>

        #csk-team{
            background-color: red;
            padding: 10px;
        }

        .csk-player{
            background-color: yellow;
            margin: 10px;
            
        }
        .p1{
            color: white;
        }

    </style>

</head>
<body>

    <!-- 
    id - #idNaame
    class - .className
     
    -->
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>


    <div id="csk-team">
        <div class="csk-player p1">Csk-player-1</div>
        <div class="csk-player">Csk-player-2</div>
        <div class="csk-player">Csk-player-3</div>
        <div class="csk-player">Csk-player-4</div>
        <div class="csk-player">Csk-player-5</div>
    </div>
    
</body>
</html>
