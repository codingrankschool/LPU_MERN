<!DOCTYPE html>
<html lang="en">
<head>
    <title>CSS Selectors</title>

    <style>

        *{
            background-color: teal;
        }

        p, h1{
           background-color: red;
           color: white; 
        }

        input[type="text"]{
            background-color: green;
        }

    </style>

</head>
<body>

    <!-- Why CSS Selectors:
    Inline CSS - Internal/External
    
    1. ID
    2. CLASS
    3. UNIVERSAL
    4. GROUP
    5. TAG/TYPE
    -->

   <h1>Heading Element</h1>
   <p>I'm pargraph 1</p>
   <p>I'm pargraph 2</p>
   <p>I'm pargraph 3</p>
   <p>I'm pargraph 4</p>
   <p>I'm pargraph 5</p>

   <input type="email" placeholder="Email">
   <br>
   <input type="text" placeholder="Enter Name">
    
</body>
</html>
