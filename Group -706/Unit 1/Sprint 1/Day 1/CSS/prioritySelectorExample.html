<!DOCTYPE html>
<html lang="en">
<head>
    <title>Selector Priorities</title>

    <style>

        
        p{
            color: teal;
        }

        *{
            color: red;
        }

        .para{
            color: blue;
        }
        #special{
            color: red;
        }

    </style>

</head>
<body>




    <p>I'm paragraph - 1</p>
    <p>I'm paragraph - 2</p>
    <p style="color: orange;" id="special" class="para">I'm paragraph - 3</p>
    <p class="para">I'm paragraph - 4</p>
    <p>I'm paragraph - 5</p>
    <p>I'm paragraph - 6</p>
    <p>I'm paragraph - 7</p>
    <p>I'm paragraph - 8</p>
    <p>I'm paragraph - 9</p>
    <p>I'm paragraph - 10</p>




    <!-- Selectors Priorities 
    Inline Css - 1000
    ID - 100
    Class - 10
    Tag/Type - 1
    * - 0 
    
    -->
    
</body>
</html>
