<!DOCTYPE html>
<html lang="en">
<head>
    <title>CSS Position</title>

    <style>

        #container{
            border: 1px solid;
            padding: 10px;
            height: 10000px;
            position: relative;
        }

        #container>div{
            width: 100px;
            height: 100px;
        }

        #container>div:nth-child(1){
            background-color: red;
            /* position: relative;
            left: 200px;
            top: 20px;
            z-index: -1; */
            /* position: absolute;
            /* z-index: -1; */
            /* left: 0;
            bottom: 0;  */

            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
        }

        #container>div:nth-child(2){
            background-color: yellow;
            /* position: relative;
            z-index: -2; */
        }

        #container>div:nth-child(3){
            background-color: green;
        }

        #container>div:nth-child(4){
            background-color: pink;
        }

    </style>

</head>
<body>

    <!-- Position:
    Note: Every html element having position as static by default.
    
    There are following position properties
    1. static
    2. relative
    3. absolute
    4. fixed
    5. sticky

    we have some sub properties of position which are followings:
    left, right, top, bottom
    z-index

    Note: above sub properties are only applicable when above position property is not static.
    -->
    <br><br><br><br><br><br><br><br><br><br>

    <div id="container">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

</body>
</html>
