<!DOCTYPE html>
<html lang="en">
<head>
    <title>CSS Flex Property Examples</title>

    <style>

        #container{
            border: 1px solid red;
            padding: 10px;
            display: flex;

            /* parent property */

            /* flex-direction: column; */
            /* justify-content: space-around; */
            /* align-items: end; */
            /* flex-wrap: wrap-reverse; */
            /* flex-wrap: wrap;
            align-content: space-evenly; */

        }
        #container>div{
            border: 1px solid;
            padding: 10px;
            /* width: 100px; */
            text-align: center;

            /* child property */
            /* flex-grow: 1; */
            /* flex-shrink: 1; */
            /* order: 0; */

        }

        #container>div:nth-child(2){
            /* flex-grow: 2; */
            /* flex-shrink: 2; */
            /* order: -3; */
            flex-basis: 200px;
        }

        #container>div:nth-child(4){
            /* flex-grow: 4; */
            /* order: -1; */
        }

    </style>

</head>
<body>

    <!-- CSS Flex Property
    - If you want to align containers elements/childs/items either in x-axis/horizontally/rows wise or y-axis/vertically/column wise, you can use flex property.
    
    In short - flex is one dimension property

    There are two types of proerties in flex:

    1. Parent Property
    1.1 flex-direction
    1.2 flex-wrap
    1.3 justify-content
    1.4 align-items
    1.5 align-content
    2. Child Property
    2.1 flex-grow
    2.2 flex-shrink
    2.3 grow
    2.4 flex-basis

    Note: when above flex properties will get applied to container and also to its childs?

    answer: display:flex - whose childs you want to align
    -->

    <br><br><br><br><br><br>


    <div id="container">
        <div>Chintu</div>
        <div>Golu</div>
        <div>Chunnu</div>
        <div>Munnu</div>
    </div>
    
</body>
</html>
